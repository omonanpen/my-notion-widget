<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Message Widget</title>
    <style>
        /* CSSの部分 */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f9f8f7; /* ライトモード背景 */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #37352f;
            overflow: hidden;
        }

        /* ダークモード対応：Notionのダークモード背景に合わせる */
        @media (prefers-color-scheme: dark) {
            body { 
                color: #ebeced; 
                background-color: #191919; 
            }
        }

        #quote-box {
            text-align: center;
            padding: 15px;
            max-width: 90%;
        }

        #greeting {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        #message {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="quote-box">
        <div id="greeting"></div>
        <div id="message"></div>
    </div>

    <script>
        // JavaScriptの部分
        const quoteStock = {
            morning: [
                "人間は誰でも不安や恐怖を克服して安心を得るために生きる。 - Dio Brando",
                "恐れは常に無知から生じる。 - Ralph Waldo Emerson",
                "まずは深呼吸をひとつ。",
                "他人に対して感じるいら立ちや不快感は、自分自身を理解するのに役立つことがある。"
                "文章憎命達（文章は命の達するを憎む）- 杜甫"
            ],
            afternoon: [
                "少し休憩して、目を休めませんか？",
                "午後も無理せず、リラックスしていこう。",
                "甘いものでも食べて、エネルギー補給！",
                "順調、順調。その調子です。"
            ],
            evening: [
                "今日もお疲れ様。夜の時間を楽しみましょう。",
                "一日の振り返りをして、自分を褒めてあげて。",
                "明日の準備は、ほどほどにね。",
                "ゆっくりお風呂に浸かってリフレッシュ。"
            ],
            night: [
                "明日のために、ゆっくり休みましょう。",
                "今日あった良いことを3つ思い出してみて。",
                "スマホを置いて、静かな時間を。",
                "おやすみなさい。良い夢を。"
            ]
        };

        function displayRandomMessage() {
            const now = new Date();
            const hour = now.getHours();
            const greetingEl = document.getElementById('greeting');
            const messageEl = document.getElementById('message');

            let category = "";
            let greeting = "";

            if (hour >= 5 && hour < 11) {
                category = "morning";
                greeting = "Good Morning";
            } else if (hour >= 11 && hour < 17) {
                category = "afternoon";
                greeting = "Good Afternoon";
            } else if (hour >= 17 && hour < 21) {
                category = "evening";
                greeting = "Good Evening";
            } else {
                category = "night";
                greeting = "Good Night";
            }

            const list = quoteStock[category];
            const randomIndex = Math.floor(Math.random() * list.length);
            const selectedMessage = list[randomIndex];

            greetingEl.textContent = greeting;
            messageEl.textContent = selectedMessage;
        }

        // 読み込み時に実行
        window.onload = displayRandomMessage;
    </script>
</body>
</html>
